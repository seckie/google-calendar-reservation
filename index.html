<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px 60px;
      color: #333;
      background: #f9f9f9;
    }

    h1 {
      font-size: 1.4rem;
      border-left: 4px solid #4285f4;
      padding-left: 12px;
      margin-bottom: 28px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .step-label {
      font-size: 0.75rem;
      font-weight: bold;
      color: #4285f4;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    select, input[type=text], input[type=email] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      background: white;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #4285f4;
      box-shadow: 0 0 0 3px rgba(66,133,244,0.15);
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .slot-btn {
      padding: 12px 6px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 0.9rem;
      text-align: center;
      transition: all 0.15s;
      color: #333;
    }

    .slot-btn:hover:not(.taken):not(.selected) {
      border-color: #4285f4;
      background: #f0f4ff;
      color: #4285f4;
    }

    .slot-btn.selected {
      border-color: #4285f4;
      background: #4285f4;
      color: white;
      font-weight: bold;
    }

    .slot-btn.taken {
      background: #f5f5f5;
      color: #bbb;
      cursor: not-allowed;
      text-decoration: line-through;
      font-size: 0.8rem;
    }

    .field-group + .field-group {
      margin-top: 14px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .submit-btn:hover:not(:disabled) {
      background: #3367d6;
    }

    .submit-btn:disabled {
      background: #b0bec5;
      cursor: not-allowed;
    }

    .message {
      padding: 14px 16px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .success {
      background: #e6f4ea;
      color: #137333;
      border: 1px solid #a8d5b5;
    }

    .error {
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #f5b8b4;
    }

    .loading-text {
      color: #999;
      font-style: italic;
      font-size: 0.9rem;
      padding: 8px 0;
    }

    .hidden { display: none; }

    .selected-summary {
      font-size: 0.85rem;
      color: #555;
      margin-top: 10px;
      padding: 8px 12px;
      background: #f0f4ff;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>予約フォーム</h1>

  <!-- Step 1: 日付選択 -->
  <div class="card">
    <div class="step-label">Step 1</div>
    <label for="date-select">日付を選んでください</label>
    <select id="date-select">
      <option value="">読み込み中...</option>
    </select>
  </div>

  <!-- Step 2: 時間帯選択 -->
  <div class="card hidden" id="slots-section">
    <div class="step-label">Step 2</div>
    <label>時間帯を選んでください</label>
    <div class="slots" id="slots-container">
      <span class="loading-text">読み込み中...</span>
    </div>
  </div>

  <!-- Step 3: 個人情報入力 -->
  <div class="card hidden" id="form-section">
    <div class="step-label">Step 3</div>

    <div class="selected-summary" id="selected-summary"></div>

    <div class="field-group" style="margin-top:14px">
      <label for="name-input">お名前</label>
      <input type="text" id="name-input" placeholder="山田 太郎" autocomplete="name">
    </div>

    <div class="field-group">
      <label for="email-input">メールアドレス</label>
      <input type="email" id="email-input" placeholder="example@mail.com" autocomplete="email">
    </div>

    <div style="margin-top:20px">
      <button class="submit-btn" id="submit-btn" disabled>予約を確定する</button>
    </div>
  </div>

  <div id="message-area"></div>

  <script>
    let selectedDate = '';
    let selectedTime = '';

    // 日付一覧を読み込む
    google.script.run
      .withSuccessHandler(function(dates) {
        const sel = document.getElementById('date-select');
        if (!dates || dates.length === 0) {
          sel.innerHTML = '<option value="">予約可能な日程がありません</option>';
          return;
        }
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        sel.innerHTML = '<option value="">-- 日付を選択してください --</option>' +
          dates.map(function(d) {
            const parts = d.split('-');
            const wd = weekdays[new Date(+parts[0], +parts[1] - 1, +parts[2]).getDay()];
            return '<option value="' + d + '">' +
              parts[0] + '年' + parts[1] + '月' + parts[2] + '日（' + wd + '）</option>';
          }).join('');
      })
      .withFailureHandler(function() {
        document.getElementById('date-select').innerHTML =
          '<option value="">エラーが発生しました。再読み込みしてください。</option>';
      })
      .getAvailableDates();

    // 日付選択時：スロットを取得して表示
    document.getElementById('date-select').addEventListener('change', function() {
      selectedDate = this.value;
      selectedTime = '';
      updateSummary();
      updateSubmitBtn();

      document.getElementById('form-section').classList.add('hidden');

      if (!selectedDate) {
        document.getElementById('slots-section').classList.add('hidden');
        return;
      }

      const container = document.getElementById('slots-container');
      container.innerHTML = '<span class="loading-text">読み込み中...</span>';
      document.getElementById('slots-section').classList.remove('hidden');

      google.script.run
        .withSuccessHandler(function(slots) {
          container.innerHTML = '';
          if (!slots || slots.length === 0) {
            container.innerHTML = '<p style="color:#999">この日の予約枠はありません。</p>';
            return;
          }
          slots.forEach(function(slot) {
            const btn = document.createElement('button');
            btn.className = 'slot-btn' + (slot.available ? '' : ' taken');
            btn.textContent = slot.available ? slot.time : slot.time + '\n予約済';
            btn.disabled = !slot.available;

            if (slot.available) {
              btn.addEventListener('click', function() {
                document.querySelectorAll('.slot-btn').forEach(function(b) {
                  b.classList.remove('selected');
                });
                btn.classList.add('selected');
                selectedTime = slot.time;
                document.getElementById('form-section').classList.remove('hidden');
                updateSummary();
                updateSubmitBtn();
              });
            }
            container.appendChild(btn);
          });
        })
        .withFailureHandler(function() {
          container.innerHTML = '<p style="color:#c5221f">スロットの取得に失敗しました。</p>';
        })
        .getSlots(selectedDate);
    });

    document.getElementById('name-input').addEventListener('input', updateSubmitBtn);
    document.getElementById('email-input').addEventListener('input', updateSubmitBtn);

    function updateSummary() {
      const el = document.getElementById('selected-summary');
      if (selectedDate && selectedTime) {
        const parts = selectedDate.split('-');
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        const wd = weekdays[new Date(+parts[0], +parts[1] - 1, +parts[2]).getDay()];
        el.textContent = '選択中: ' + parts[0] + '年' + parts[1] + '月' + parts[2] +
          '日（' + wd + '） ' + selectedTime + '〜';
      } else {
        el.textContent = '';
      }
    }

    function updateSubmitBtn() {
      const name  = document.getElementById('name-input').value.trim();
      const email = document.getElementById('email-input').value.trim();
      document.getElementById('submit-btn').disabled =
        !(selectedDate && selectedTime && name && email);
    }

    // 予約送信
    document.getElementById('submit-btn').addEventListener('click', function() {
      const name  = document.getElementById('name-input').value.trim();
      const email = document.getElementById('email-input').value.trim();

      if (!name || !email) {
        showMessage('お名前とメールアドレスを入力してください。', 'error');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = '送信中...';
      clearMessage();

      google.script.run
        .withSuccessHandler(function(result) {
          btn.textContent = '予約を確定する';
          if (result.success) {
            showMessage(
              '✓ ' + result.message + '\n予約ID: ' + result.id,
              'success'
            );
            // フォームをリセット
            document.getElementById('date-select').value = '';
            document.getElementById('slots-section').classList.add('hidden');
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('name-input').value = '';
            document.getElementById('email-input').value = '';
            selectedDate = '';
            selectedTime = '';
          } else {
            showMessage('✗ ' + result.message, 'error');
            updateSubmitBtn();
          }
        })
        .withFailureHandler(function() {
          btn.textContent = '予約を確定する';
          showMessage('✗ 通信エラーが発生しました。再度お試しください。', 'error');
          updateSubmitBtn();
        })
        .createBooking(name, email, selectedDate, selectedTime);
    });

    function showMessage(msg, type) {
      document.getElementById('message-area').innerHTML =
        '<div class="message ' + type + '">' +
        msg.replace(/\n/g, '<br>') + '</div>';
    }

    function clearMessage() {
      document.getElementById('message-area').innerHTML = '';
    }
  </script>
</body>
</html>
